<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>Blissful Senja — Admin Login</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: linear-gradient(135deg, #0f172a, #1e293b); color: #f1f5f9; }
  body { display: flex; align-items: center; justify-content: center; padding: 20px; padding: max(20px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right)) max(20px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left)); }
  .card { width: 100%; max-width: 380px; background: rgba(30, 41, 59, 0.9); border: 1px solid rgba(148, 163, 184, 0.2); border-radius: 16px; padding: 32px 24px; }
  h1 { margin: 0 0 8px; font-size: 24px; font-weight: 600; }
  p { margin: 0 0 24px; color: #94a3b8; font-size: 14px; }
  label { display: block; font-size: 13px; font-weight: 500; margin-bottom: 6px; color: #cbd5e1; }
  input { width: 100%; padding: 14px 16px; font-size: 16px; background: #0f172a; border: 1px solid #334155; border-radius: 10px; color: #f1f5f9; }
  input:focus { outline: none; border-color: #38bdf8; }
  button { width: 100%; margin-top: 16px; padding: 14px; font-size: 16px; font-weight: 600; background: #38bdf8; color: #0f172a; border: none; border-radius: 10px; cursor: pointer; }
  button:hover { background: #7dd3fc; }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .error { margin-top: 12px; padding: 10px 12px; background: rgba(239, 68, 68, 0.15); border: 1px solid rgba(239, 68, 68, 0.3); border-radius: 8px; color: #fca5a5; font-size: 13px; }
</style>
</head>
<body>
<div class="card">
  <h1>🌺 Admin Login</h1>
  <p>Blissful Senja Bot Dashboard</p>
  <form id="loginForm" onsubmit="return login(event)">
    <label for="pw">Password</label>
    <input id="pw" type="password" autocomplete="current-password" autofocus required>
    <button type="submit" id="btn">Log in</button>
    <div id="err" class="error" style="display:none"></div>
  </form>
</div>
<script>
async function login(e) {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  const pw = document.getElementById('pw').value;
  btn.disabled = true; btn.textContent = 'Logging in…'; err.style.display = 'none';
  try {
    const res = await fetch('/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw }),
    });
    if (res.ok) { window.location.href = '/admin'; return false; }
    const data = await res.json().catch(() => ({}));
    err.textContent = data.error || 'Login failed';
    err.style.display = 'block';
  } catch (e2) {
    err.textContent = 'Network error';
    err.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Log in';
  return false;
}
</script>
</body>
</html>
