<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#0f172a">
<title>Blissful Senja — Admin Dashboard</title>
<style>
  :root {
    --bg: #0f172a;
    --bg2: #1e293b;
    --bg3: #334155;
    --border: #334155;
    --text: #f1f5f9;
    --muted: #94a3b8;
    --accent: #38bdf8;
    --danger: #ef4444;
    --success: #22c55e;
    --warn: #f59e0b;
    --user: #334155;
    --assistant: #0ea5e9;
    --admin: #a855f7;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); font-size: 14px; }

  /* ── Layout ─────────────────────────────────────────────────── */
  #app { display: grid; height: 100dvh; grid-template-rows: auto auto 1fr; }

  header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; padding-top: max(12px, env(safe-area-inset-top)); border-bottom: 1px solid var(--border); background: var(--bg2); }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; }
  header .actions { display: flex; gap: 8px; align-items: center; }
  .master-toggle { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; font-size: 12px; cursor: pointer; }
  .master-toggle .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--muted); }
  .master-toggle.on .dot { background: var(--success); }
  .master-toggle.off .dot { background: var(--danger); }
  .logout { background: none; border: 1px solid var(--border); color: var(--muted); padding: 6px 10px; border-radius: 20px; font-size: 12px; cursor: pointer; }

  /* ── Stats bar ──────────────────────────────────────────────── */
  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
  .stat { background: var(--bg2); padding: 10px 8px; text-align: center; }
  .stat .num { font-size: 20px; font-weight: 700; color: var(--accent); }
  .stat .label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

  /* ── Main area ──────────────────────────────────────────────── */
  main { display: grid; grid-template-columns: 1fr; overflow: hidden; }
  @media (min-width: 768px) {
    main { grid-template-columns: 340px 1fr; }
  }

  /* ── Conversation list ─────────────────────────────────────── */
  .convo-list { overflow-y: auto; background: var(--bg); border-right: 1px solid var(--border); -webkit-overflow-scrolling: touch; }
  .convo-search { position: sticky; top: 0; z-index: 2; padding: 10px; background: var(--bg); border-bottom: 1px solid var(--border); }
  .convo-search input { width: 100%; padding: 10px 12px; font-size: 14px; background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); }
  .convo-search input:focus { outline: none; border-color: var(--accent); }
  .convo { display: flex; gap: 10px; align-items: flex-start; padding: 12px 14px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .convo:hover, .convo.active { background: var(--bg2); }
  .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--bg3); display: flex; align-items: center; justify-content: center; font-weight: 600; color: var(--text); flex-shrink: 0; }
  .convo-body { flex: 1; min-width: 0; }
  .convo-row1 { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .convo-name { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .convo-time { font-size: 11px; color: var(--muted); flex-shrink: 0; }
  .convo-preview { color: var(--muted); font-size: 12px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-top: 2px; }
  .badges { display: flex; gap: 4px; margin-top: 4px; }
  .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: 0.5px; font-weight: 600; }
  .badge.escalated { background: var(--danger); color: white; }
  .badge.paused { background: var(--warn); color: white; }

  /* ── Chat detail ───────────────────────────────────────────── */
  .chat { display: none; grid-template-rows: auto 1fr auto; overflow: hidden; }
  .chat.open { display: grid; }
  @media (min-width: 768px) {
    .chat { display: grid; }
  }

  .chat-header { display: flex; align-items: center; gap: 10px; padding: 12px 14px; border-bottom: 1px solid var(--border); background: var(--bg2); }
  .chat-back { display: none; background: none; border: none; color: var(--accent); font-size: 20px; padding: 0 4px; cursor: pointer; }
  @media (max-width: 767px) { .chat-back { display: block; } }
  .chat-info { flex: 1; min-width: 0; }
  .chat-name { font-weight: 600; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chat-phone { font-size: 11px; color: var(--muted); }
  .chat-actions { display: flex; gap: 6px; flex-wrap: wrap; }
  .chat-actions button { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: 6px; font-size: 12px; cursor: pointer; white-space: nowrap; }
  .chat-actions button.on { background: var(--warn); border-color: var(--warn); color: white; }
  .chat-actions button.escalate { background: var(--danger); border-color: var(--danger); color: white; }
  .chat-actions button.clear { background: var(--success); border-color: var(--success); color: white; }

  .messages { overflow-y: auto; padding: 16px 12px; display: flex; flex-direction: column; gap: 10px; background: var(--bg); -webkit-overflow-scrolling: touch; }
  .empty { text-align: center; color: var(--muted); padding: 40px 20px; }
  .msg { max-width: 78%; padding: 8px 12px; border-radius: 12px; word-wrap: break-word; white-space: pre-wrap; font-size: 14px; line-height: 1.4; }
  .msg .meta { font-size: 10px; color: var(--muted); margin-top: 4px; }
  .msg.user { align-self: flex-start; background: var(--user); }
  .msg.assistant { align-self: flex-end; background: var(--assistant); color: white; }
  .msg.admin { align-self: flex-end; background: var(--admin); color: white; }
  .msg-role { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.75; margin-bottom: 2px; }

  .composer { padding: 10px; padding-bottom: max(10px, env(safe-area-inset-bottom)); border-top: 1px solid var(--border); background: var(--bg2); display: flex; gap: 8px; align-items: flex-end; }
  .composer textarea { flex: 1; resize: none; min-height: 40px; max-height: 120px; padding: 10px 12px; font-size: 15px; font-family: inherit; background: var(--bg); border: 1px solid var(--border); border-radius: 20px; color: var(--text); }
  .composer textarea:focus { outline: none; border-color: var(--accent); }
  .composer button { background: var(--accent); color: var(--bg); border: none; padding: 10px 16px; border-radius: 20px; font-weight: 600; cursor: pointer; font-size: 14px; }
  .composer button:disabled { opacity: 0.5; cursor: not-allowed; }
  .composer .warn { font-size: 11px; color: var(--warn); padding: 0 4px 4px; }

  /* ── Placeholder when no chat selected ─────────────────────── */
  .placeholder { display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 14px; padding: 40px; text-align: center; }

  /* ── Toast ─────────────────────────────────────────────────── */
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--bg2); border: 1px solid var(--border); padding: 10px 16px; border-radius: 8px; font-size: 13px; z-index: 100; opacity: 0; transition: opacity 0.2s; pointer-events: none; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>🌺 Blissful Senja</h1>
    <div class="actions">
      <button class="master-toggle" id="masterToggle" onclick="toggleGlobalBot()">
        <span class="dot"></span><span id="masterLabel">Bot</span>
      </button>
      <button class="logout" onclick="logout()">Logout</button>
    </div>
  </header>

  <div class="stats">
    <div class="stat"><div class="num" id="statTotal">–</div><div class="label">Total</div></div>
    <div class="stat"><div class="num" id="statToday">–</div><div class="label">Today</div></div>
    <div class="stat"><div class="num" id="statEsc">–</div><div class="label">Escalated</div></div>
    <div class="stat"><div class="num" id="statMsgs">–</div><div class="label">Messages</div></div>
  </div>

  <main>
    <div class="convo-list" id="convoList">
      <div class="convo-search"><input id="search" placeholder="Search name or number…" oninput="renderList()"></div>
      <div id="convoItems"></div>
    </div>

    <div class="chat" id="chatPanel">
      <div class="placeholder" id="placeholder">Select a conversation to view</div>
      <div id="chatView" style="display:none; grid-template-rows: auto 1fr auto; overflow:hidden; height:100%;">
        <div class="chat-header">
          <button class="chat-back" onclick="closeChat()">‹</button>
          <div class="chat-info">
            <div class="chat-name" id="chatName">–</div>
            <div class="chat-phone" id="chatPhone">–</div>
          </div>
          <div class="chat-actions">
            <button id="pauseBtn" onclick="togglePause()">Pause bot</button>
            <button class="escalate" onclick="notifyTherapist()">Notify</button>
            <button class="clear" id="clearBtn" onclick="clearEsc()" style="display:none">Clear ⚠</button>
          </div>
        </div>
        <div class="messages" id="messages"></div>
        <div class="composer">
          <textarea id="composer" placeholder="Type a reply as admin…" rows="1"
            oninput="autoGrow(this)" onkeydown="composerKey(event)"></textarea>
          <button id="sendBtn" onclick="sendReply()">Send</button>
        </div>
      </div>
    </div>
  </main>
</div>
<div class="toast" id="toast"></div>

<script>
let conversations = [];
let currentPhone = null;
let currentSession = null;
let messages = [];
let botEnabled = true;

// ── Utils ──────────────────────────────────────────────────────
function relTime(iso) {
  if (!iso) return '';
  const d = new Date(iso), now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm';
  if (diff < 86400) return Math.floor(diff/3600) + 'h';
  return Math.floor(diff/86400) + 'd';
}
function initials(name, phone) {
  if (name) return name.split(/\s+/).map(w=>w[0]).slice(0,2).join('').toUpperCase();
  return (phone || '').slice(-2);
}
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}
function escapeHtml(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
async function api(path, opts) {
  const res = await fetch(path, { headers: { 'Content-Type': 'application/json' }, ...opts });
  if (res.status === 401) { window.location.href = '/admin/login'; return null; }
  return res.json();
}

// ── Initial load ───────────────────────────────────────────────
async function loadStats() {
  const s = await api('/admin/api/stats'); if (!s) return;
  document.getElementById('statTotal').textContent = s.totalConvos;
  document.getElementById('statToday').textContent = s.todayConvos;
  document.getElementById('statEsc').textContent = s.escalated;
  document.getElementById('statMsgs').textContent = s.totalMessages;
  botEnabled = s.botEnabled;
  updateMasterToggle();
}
function updateMasterToggle() {
  const el = document.getElementById('masterToggle');
  el.classList.toggle('on', botEnabled);
  el.classList.toggle('off', !botEnabled);
  document.getElementById('masterLabel').textContent = botEnabled ? 'Bot on' : 'Bot off';
}

async function loadConversations() {
  const list = await api('/admin/api/conversations'); if (!list) return;
  conversations = list; renderList();
}

function renderList() {
  const q = (document.getElementById('search').value || '').toLowerCase().trim();
  const filtered = q
    ? conversations.filter(c => (c.name || '').toLowerCase().includes(q) || c.phone.includes(q))
    : conversations;

  const html = filtered.map(c => `
    <div class="convo ${c.phone === currentPhone ? 'active' : ''}" onclick="openChat('${c.phone}')">
      <div class="avatar">${escapeHtml(initials(c.name, c.phone))}</div>
      <div class="convo-body">
        <div class="convo-row1">
          <div class="convo-name">${escapeHtml(c.name || c.phone)}</div>
          <div class="convo-time">${relTime(c.last_message_at)}</div>
        </div>
        <div class="convo-preview">${escapeHtml(c.preview)}</div>
        <div class="badges">
          ${c.escalated ? '<span class="badge escalated">Urgent</span>' : ''}
          ${c.bot_paused ? '<span class="badge paused">Paused</span>' : ''}
        </div>
      </div>
    </div>
  `).join('');

  document.getElementById('convoItems').innerHTML = html || '<div class="empty">No conversations yet</div>';
}

// ── Open chat ──────────────────────────────────────────────────
async function openChat(phone) {
  currentPhone = phone;
  renderList();
  document.getElementById('placeholder').style.display = 'none';
  document.getElementById('chatView').style.display = 'grid';
  document.getElementById('chatPanel').classList.add('open');

  const data = await api('/admin/api/conversations/' + encodeURIComponent(phone)); if (!data) return;
  currentSession = data.session;
  messages = data.messages;
  renderChat();
}

function renderChat() {
  if (!currentSession) return;
  document.getElementById('chatName').textContent = currentSession.customer_name || currentSession.phone;
  document.getElementById('chatPhone').textContent = '+' + currentSession.phone;

  const pauseBtn = document.getElementById('pauseBtn');
  pauseBtn.textContent = currentSession.bot_paused ? 'Resume bot' : 'Pause bot';
  pauseBtn.classList.toggle('on', currentSession.bot_paused);

  document.getElementById('clearBtn').style.display = currentSession.escalated ? '' : 'none';

  const container = document.getElementById('messages');
  if (!messages.length) {
    container.innerHTML = '<div class="empty">No messages yet</div>';
    return;
  }
  container.innerHTML = messages.map(m => `
    <div class="msg ${m.role}">
      <div class="msg-role">${m.role === 'admin' ? 'You (admin)' : m.role}</div>
      ${escapeHtml(m.content)}
      <div class="meta">${new Date(m.created_at).toLocaleString()}</div>
    </div>
  `).join('');
  container.scrollTop = container.scrollHeight;
}

function closeChat() {
  document.getElementById('chatPanel').classList.remove('open');
  currentPhone = null;
  renderList();
}

// ── Actions ────────────────────────────────────────────────────
async function togglePause() {
  const r = await api('/admin/api/conversations/' + encodeURIComponent(currentPhone) + '/toggle-pause', { method: 'POST' });
  if (r?.ok) {
    currentSession.bot_paused = r.bot_paused;
    renderChat();
    toast(r.bot_paused ? 'Bot paused for this customer' : 'Bot resumed');
    loadConversations();
  }
}
async function clearEsc() {
  const r = await api('/admin/api/conversations/' + encodeURIComponent(currentPhone) + '/clear-escalation', { method: 'POST' });
  if (r?.ok) {
    currentSession.escalated = false;
    renderChat(); loadConversations();
    toast('Escalation cleared');
  }
}
async function notifyTherapist() {
  const r = await api('/admin/api/conversations/' + encodeURIComponent(currentPhone) + '/notify-therapist', { method: 'POST' });
  if (r?.ok) toast('Therapist notified'); else toast('Failed to notify');
}
async function sendReply() {
  const ta = document.getElementById('composer');
  const text = ta.value.trim(); if (!text) return;
  document.getElementById('sendBtn').disabled = true;
  const r = await api('/admin/api/conversations/' + encodeURIComponent(currentPhone) + '/reply', {
    method: 'POST', body: JSON.stringify({ text })
  });
  document.getElementById('sendBtn').disabled = false;
  if (r?.ok) { ta.value = ''; autoGrow(ta); toast('Sent'); }
  else toast('Send failed');
}
async function toggleGlobalBot() {
  const r = await api('/admin/api/bot-enabled', { method: 'POST', body: JSON.stringify({ enabled: !botEnabled }) });
  if (r?.ok) { botEnabled = r.enabled; updateMasterToggle(); toast(botEnabled ? 'Bot ON globally' : 'Bot OFF globally'); }
}
async function logout() {
  await fetch('/admin/logout', { method: 'POST' });
  window.location.href = '/admin/login';
}

// ── Composer helpers ───────────────────────────────────────────
function autoGrow(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }
function composerKey(e) {
  if (e.key === 'Enter' && !e.shiftKey && !window.matchMedia('(max-width: 767px)').matches) {
    e.preventDefault(); sendReply();
  }
}

// ── SSE live updates ───────────────────────────────────────────
let sseRetry = 0;
function connectSSE() {
  const es = new EventSource('/admin/events');
  es.onopen = () => { sseRetry = 0; };
  es.onmessage = (e) => {
    try {
      const ev = JSON.parse(e.data);
      if (ev.type === 'message') {
        if (ev.phone === currentPhone) {
          messages.push({ role: ev.role, content: ev.content, created_at: new Date().toISOString() });
          renderChat();
        }
        loadConversations(); loadStats();
      } else if (ev.type === 'session_updated') {
        if (ev.phone === currentPhone) openChat(currentPhone);
        loadConversations(); loadStats();
      } else if (ev.type === 'settings_updated') {
        loadStats();
      }
    } catch {}
  };
  es.onerror = () => {
    es.close();
    // exponential backoff, cap at 30s
    const delay = Math.min(30000, 1000 * Math.pow(2, sseRetry++));
    setTimeout(connectSSE, delay);
  };
}

// ── Boot ───────────────────────────────────────────────────────
loadStats(); loadConversations(); connectSSE();
setInterval(loadStats, 60000); // refresh stats every minute as safety net
</script>
</body>
</html>
